name: "🔄 Scraping immobilier → Supabase"

# ─── Déclencheurs ───────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "0 7,13,19 * * *"  # 3×/jour : 7h, 13h, 19h UTC (9h/15h/21h Paris)
  workflow_dispatch:             # déclenchement manuel depuis l'onglet Actions
                                 # → sélectionner la branche dans le menu déroulant

# ─── Permissions ────────────────────────────────────────────────────────────────
# Plus de git push → plus besoin de contents: write
permissions:
  contents: read

# ─── Job ────────────────────────────────────────────────────────────────────────
jobs:
  scrape:
    name: "BienIci → Supabase"
    runs-on: ubuntu-latest
    timeout-minutes: 15          # BienIci API est rapide, 15 min largement suffisant

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────────
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      # ── 2. Python 3.11 ─────────────────────────────────────────────────────────
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dépendances ─────────────────────────────────────────────────────────
      - name: "📦 Installer les dépendances"
        run: pip install supabase requests

      # ── 4. Scraping BienIci + push Supabase ────────────────────────────────────
      - name: "🕷️ Scraping BienIci → Supabase"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PYTHONPATH:   ${{ github.workspace }}
        run: python -m scraping.run_scraping
