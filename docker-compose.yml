version: "3.9"

services:

  ollama:
    image: ollama/ollama:latest
    container_name: nidbot_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # GPU support (uncomment if you have NVIDIA GPU):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nidbot_api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=ollama:11434
      - OLLAMA_MODEL=llama3
    depends_on:
      - ollama
    restart: unless-stopped
    volumes:
      - /tmp:/tmp  # For PDF generation

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: nidbot_streamlit
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local

networks:
  nidbot-network:
    driver: bridge
